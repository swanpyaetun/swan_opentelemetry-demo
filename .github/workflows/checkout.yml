name: checkout

on:
  push:
    branches:
      - main
    paths:
      - 'src/checkout/**'
      - '!swan_kubernetes/swan_helm/swan_microservices/**/values.yaml'
  workflow_dispatch:

jobs:
  swan_docker:
    uses: ./.github/workflows/swan_docker.yml
    with:
      swan_aws_region: "ap-southeast-1"
      swan_ecr_repository: "swan_polyglot-microservices-application/checkout"
      swan_dockerfile_path: "src/checkout/Dockerfile"
    secrets:
      SWAN_CI_IAM_ROLE_ARN: ${{ secrets.SWAN_CI_IAM_ROLE_ARN }}