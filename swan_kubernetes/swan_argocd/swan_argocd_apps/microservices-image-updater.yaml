---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: microservices
  namespace: argocd
spec:
  namespace: argocd
  commonUpdateSettings:
    updateStrategy: newest-build
  writeBackConfig:
    method: "git:secret:argocd/git-creds"
    gitConfig:
      repository: https://github.com/swanpyaetun/swan_opentelemetry-demo.git
      branch: main
      writeBackTarget: helmvalues:./values.yaml
  applicationRefs:
    - namePattern: accounting
      images:
        - alias: accounting
          imageName: 655355946217.dkr.ecr.ap-southeast-1.amazonaws.com/swan_opentelemetry-demo/accounting
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
    - namePattern: ad
      images:
        - alias: ad
          imageName: 655355946217.dkr.ecr.ap-southeast-1.amazonaws.com/swan_opentelemetry-demo/ad
